<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANSKAR FF - Premium Quiz</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #020b18; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; }
        .premium-btn { padding: 15px 30px; border-radius: 50px; border: none; background: linear-gradient(45deg, #0066ff, #00f2ff); color: white; font-weight: bold; cursor: pointer; margin: 10px; }
        .premium-btn:disabled { opacity: 0.5; cursor: wait; }
        input { padding: 15px; border-radius: 10px; border: 1px solid var(--accent); background: none; color: white; width: 80%; margin-bottom: 20px; text-align: center; }
        #quiz-page, #lobby-page, #online-menu-page, #online-join-page, #result-page { display: none; }
        .option { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-page">
            <h1>SANSKAR FF</h1>
            <input type="text" id="player-name-input" placeholder="ENTER YOUR NAME">
            <br>
            <button class="premium-btn" onclick="showOnlineMenu()">ONLINE MULTIPLAYER</button>
        </div>

        <div id="online-menu-page">
            <h2>ONLINE MODE</h2>
            <p id="status-text" style="color: yellow; display: none;">Wake-up signal sent... (30-50s)</p>
            <button id="create-btn" class="premium-btn" onclick="initOnlineHost()">CREATE ROOM</button>
            <button class="premium-btn" onclick="showOnlineJoin()">JOIN ROOM</button>
        </div>

        <div id="online-join-page">
            <input type="text" id="join-code" placeholder="ENTER 6-DIGIT CODE">
            <button class="premium-btn" onclick="joinOnlineByCode()">JOIN NOW</button>
        </div>

        <div id="lobby-page">
            <h2>LOBBY</h2>
            <h1 id="room-display" style="color: var(--accent); letter-spacing: 5px;">------</h1>
            <div id="qrcode"></div>
            <div id="player-list"></div>
            <div id="host-controls" style="display:none">
                <button class="premium-btn" onclick="startGame()">START GAME</button>
            </div>
        </div>

        <div id="quiz-page">
            <h2 id="question">Question</h2>
            <div id="options"></div>
        </div>

        <div id="result-page">
            <h2>FINAL RANKING</h2>
            <div id="final-list"></div>
            <button class="premium-btn" onclick="location.reload()">HOME</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://sanskar-quiz-server.onrender.com";
        let socket, playerName, currentRoom, score = 0;

        function showOnlineMenu() {
            playerName = document.getElementById('player-name-input').value;
            if(!playerName) return alert("Enter Name");
            document.getElementById('start-page').style.display = 'none';
            document.getElementById('online-menu-page').style.display = 'block';
        }

        function showOnlineJoin() {
            document.getElementById('online-menu-page').style.display = 'none';
            document.getElementById('online-join-page').style.display = 'block';
        }

        function initOnlineHost() {
            const btn = document.getElementById('create-btn');
            const status = document.getElementById('status-text');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> CONNECTING...';
            status.style.display = 'block';

            socket = io(SERVER_URL, { transports: ['polling', 'websocket'] });

            socket.on('connect', () => {
                socket.emit('create-room', { name: playerName, avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed='+playerName });
            });

            setupListeners();
        }

        function joinOnlineByCode() {
            const code = document.getElementById('join-code').value.toUpperCase();
            socket = io(SERVER_URL);
            socket.on('connect', () => {
                socket.emit('join-room', { room: code, name: playerName, avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed='+playerName });
            });
            setupListeners();
        }

        function setupListeners() {
            socket.on('room-created', data => {
                currentRoom = data.room;
                document.getElementById('online-menu-page').style.display = 'none';
                document.getElementById('lobby-page').style.display = 'block';
                document.getElementById('host-controls').style.display = 'block';
                document.getElementById('room-display').innerText = currentRoom;
                new QRCode(document.getElementById("qrcode"), { text: currentRoom, width: 128, height: 128 });
            });

            socket.on('players-update', players => {
                document.getElementById('player-list').innerHTML = players.map(p => `<p>👤 ${p.name}</p>`).join('');
                if(document.getElementById('online-join-page').style.display === 'block') {
                    document.getElementById('online-join-page').style.display = 'none';
                    document.getElementById('lobby-page').style.display = 'block';
                }
            });

            socket.on('game-start', () => {
                document.getElementById('lobby-page').style.display = 'none';
                document.getElementById('quiz-page').style.display = 'block';
                showQuestion();
            });

            socket.on('final-board', players => {
                document.getElementById('quiz-page').style.display = 'none';
                document.getElementById('result-page').style.display = 'block';
                document.getElementById('final-list').innerHTML = players.map((p, i) => `<p>#${i+1} ${p.name} - ${p.score}</p>`).join('');
            });

            socket.on('error-msg', msg => alert(msg));
        }

        function startGame() { socket.emit('start-game', currentRoom); }

        function showQuestion() {
            document.getElementById('question').innerText = "1. 'श्रम विभाजन' के लेखक कौन हैं?";
            const options = ["गांधी", "अंबेडकर", "नेहरू", "तिलक"];
            document.getElementById('options').innerHTML = options.map(opt => 
                `<div class="option" onclick="answer('${opt}')">${opt}</div>`
            ).join('');
        }

        function answer(val) {
            if(val === "अंबेडकर") score += 25;
            socket.emit('submit-answer', { room: currentRoom, score: score, totalTime: 10 });
            socket.emit('finish-game', currentRoom);
        }
    </script>
</body>
</html>
