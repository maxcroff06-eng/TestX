<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANSKAR FF - Premium Quiz v2</title>
    
    <!-- Stable Socket.IO Client -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-dark: #020b18;
            --accent-cyan: #00f2ff;
            --accent-blue: #0066ff;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --correct: #00ff88;
            --wrong: #ff4d4d;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #020b18; color: var(--text-white); min-height: 100vh; overflow-x: hidden; }
        
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .shape { position: absolute; background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan)); filter: blur(100px); border-radius: 50%; opacity: 0.2; animation: float 15s infinite alternate; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(50px, 50px); } }

        .container { width: 95%; max-width: 900px; margin: 40px auto; background: var(--glass-white); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative; }
        .big-title { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; letter-spacing: 8px; text-transform: uppercase; }

        #player-name-input {
            width: 100%; max-width: 500px; height: 65px; margin: 20px auto; display: block;
            background: rgba(255, 255, 255, 0.05); border: 2px solid var(--glass-border);
            border-radius: 15px; color: #fff; font-size: 24px; font-weight: bold; text-align: center; outline: none;
        }

        .premium-btn { padding: 18px 45px; font-size: 1.1rem; font-weight: bold; background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan)); border: none; border-radius: 50px; color: white; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin: 10px; }
        .premium-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent-cyan); }
        .premium-btn:disabled { background: gray; cursor: not-allowed; }

        #quiz-page, #result-page, #lobby-page, #join-entry-page, #online-menu-page, #online-join-page { display: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .option { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .option.correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct) !important; }
        .option.wrong { background: rgba(255, 77, 77, 0.2) !important; border-color: var(--wrong) !important; }

        #live-rank-box { position: fixed; top: 10px; right: 10px; width: 200px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--accent-cyan); border-radius: 15px; padding: 10px; z-index: 1000; display: none; }
        #timer-display { position: fixed; top: 10px; left: 10px; font-size: 1.8rem; font-weight: bold; color: var(--accent-cyan); z-index: 1001; }

        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } .big-title { font-size: 2.2rem; } }
    </style>
</head>
<body>

    <div id="live-rank-box">
        <div style="font-size: 0.7rem; color: var(--accent-cyan); text-align: center;">LIVE RANKING</div>
        <div id="live-rank-list"></div>
    </div>

    <div class="bg-shapes">
        <div class="shape" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
        <div class="shape" style="width: 400px; height: 400px; bottom: -150px; right: -150px;"></div>
    </div>

    <div class="container">
        
        <!-- START PAGE -->
        <div id="start-page">
            <h1 class="big-title">SANSKAR FF</h1>
            <div style="text-align: center;">
                <img id="my-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Sanskar" style="width: 100px; border-radius: 50%; border: 3px solid var(--accent-cyan); margin-bottom: 10px;">
            </div>
            <input type="text" id="player-name-input" placeholder="ENTER YOUR NAME" maxlength="15">
            <div style="text-align: center;">
                <button class="premium-btn" onclick="startSolo()">SOLO MATCH</button>
                <button class="premium-btn" style="background: #ff0077;" onclick="showOnlineMenu()">ONLINE MULTIPLAYER</button>
            </div>
        </div>

        <!-- ONLINE MENU -->
        <div id="online-menu-page">
            <h2 class="big-title" style="font-size: 2rem;">ONLINE MODE</h2>
            <div style="text-align: center;">
                <p id="conn-status" style="margin-bottom: 10px; color: yellow; display: none;">Connecting to server... Please wait 30s</p>
                <button id="create-btn" class="premium-btn" style="background: #6e00ff; width: 100%;" onclick="initOnlineHost()">CREATE ONLINE ROOM</button>
                <button id="join-menu-btn" class="premium-btn" style="background: #00a8ff; width: 100%;" onclick="showOnlineJoin()">JOIN ONLINE ROOM</button>
                <button class="premium-btn" style="background:transparent; border:1px solid white;" onclick="location.reload()">BACK</button>
            </div>
        </div>

        <!-- ONLINE JOIN -->
        <div id="online-join-page">
            <h2 class="big-title" style="font-size: 2rem;">JOIN ONLINE</h2>
            <input type="text" id="online-room-code-input" placeholder="6-DIGIT CODE" maxlength="6" style="width:100%; max-width:300px; padding:15px; border-radius:50px; background:rgba(0,0,0,0.3); color:white; border:1px solid #ff0077; text-align:center; display:block; margin:20px auto;">
            <div style="text-align: center;">
                <button class="premium-btn" style="background: #ff0077;" onclick="joinOnlineByCode()">JOIN NOW</button>
                <button class="premium-btn" style="background:transparent; border:1px solid white;" onclick="showOnlineMenu()">BACK</button>
            </div>
        </div>

        <!-- LOBBY -->
        <div id="lobby-page">
            <h2 class="big-title" style="font-size: 2.5rem;">LOBBY</h2>
            <div style="text-align: center;">
                <div id="room-code-display" style="font-size: 3rem; color: var(--accent-cyan); font-weight: 800; letter-spacing: 5px;">------</div>
                <div id="qrcode" style="background: white; padding: 10px; display: inline-block; margin: 20px 0; border-radius: 10px;"></div>
                <div id="lobby-players" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0;"></div>
                <div id="host-controls" style="display: none;">
                    <button class="premium-btn" onclick="startMultiplayerGame()">START MATCH</button>
                </div>
            </div>
        </div>

        <!-- QUIZ PAGE -->
        <div id="quiz-page">
            <div id="timer-display">00:00</div>
            <h2 id="question-text" style="min-height: 100px; font-size: 1.5rem; margin-top: 50px;">Question...</h2>
            <div class="options-grid" id="options-container"></div>
        </div>

        <!-- RESULT PAGE -->
        <div id="result-page">
            <h1 class="big-title">RESULT</h1>
            <div id="leaderboard-body" style="margin-top: 20px;"></div>
            <button class="premium-btn" style="width: 100%;" onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <script>
        const TEST_TIME = 600;
        const ONLINE_SERVER_URL = "https://sanskar-quiz-server.onrender.com";

        let questions = [
            { question: "'श्रम विभाजन और जाति प्रथा' के लेखक कौन हैं?", options: {A: "गांधी", B: "अंबेडकर", C: "प्रेमचंद", D: "दिनकर"}, answer: "B" },
            { question: "अंबेडकर का जन्म कब हुआ?", options: {A: "1891", B: "1892", C: "1893", D: "1894"}, answer: "A" }
        ];

        let currentIndex = 0, playerName = "", socket, currentRoom = "", myScore = 0, livePlayers = [], startTime;

        document.getElementById('player-name-input').oninput = function() {
            playerName = this.value.trim();
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/adventurer/svg?seed=${playerName || 'Sanskar'}`;
        };

        function showOnlineMenu() {
            if(!playerName) return alert("Enter Name!");
            document.getElementById('start-page').style.display = 'none';
            document.getElementById('online-menu-page').style.display = 'block';
        }

        function showOnlineJoin() {
            document.getElementById('online-menu-page').style.display = 'none';
            document.getElementById('online-join-page').style.display = 'block';
        }

        // --- FIXED ONLINE LOGIC ---
        function initOnlineHost() {
            const btn = document.getElementById('create-btn');
            const status = document.getElementById('conn-status');
            
            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            status.style.display = "block";

            // Connect to Render
            socket = io(ONLINE_SERVER_URL, { transports: ['websocket', 'polling'] });

            socket.on('connect', () => {
                console.log("Connected to Server!");
                socket.emit('create-room', { name: playerName, avatar: `https://api.dicebear.com/7.x/adventurer/svg?seed=${playerName}` });
            });

            socket.on('connect_error', () => {
                status.innerText = "Server is waking up... please wait (20-40s)";
            });

            setupSocketListeners();
        }

        function joinOnlineByCode() {
            const code = document.getElementById('online-room-code-input').value.trim().toUpperCase();
            if(code.length < 6) return alert("Enter 6-digit code");
            
            socket = io(ONLINE_SERVER_URL);
            socket.on('connect', () => {
                socket.emit('join-room', { room: code, name: playerName, avatar: `https://api.dicebear.com/7.x/adventurer/svg?seed=${playerName}` });
            });
            setupSocketListeners();
        }

        function setupSocketListeners() {
            socket.on('room-created', data => {
                currentRoom = data.room;
                document.getElementById('room-code-display').innerText = currentRoom;
                document.getElementById('online-menu-page').style.display = 'none';
                document.getElementById('lobby-page').style.display = 'block';
                document.getElementById('host-controls').style.display = 'block';
                
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentRoom, width: 128, height: 128 });
            });

            socket.on('players-update', players => {
                livePlayers = players;
                document.getElementById('lobby-players').innerHTML = players.map(p => `
                    <div style="text-align:center">
                        <img src="${p.avatar}" style="width:50px; border-radius:50%; border:2px solid cyan;">
                        <p style="font-size:12px;">${p.name}</p>
                    </div>`).join('');
            });

            socket.on('game-start', () => startQuiz('multi'));
            
            socket.on('rank-update', players => {
                livePlayers = players;
                updateLiveRankUI();
            });

            socket.on('final-board', players => {
                showFinalLeaderboard(players);
            });

            socket.on('error-msg', msg => alert(msg));
        }

        function startSolo() { if(!playerName) return alert("Enter Name!"); startQuiz('solo'); }
        function startMultiplayerGame() { socket.emit('start-game', currentRoom); }

        function startQuiz(mode) {
            document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
            document.getElementById('quiz-page').style.display = 'block';
            if(mode === 'multi') {
                document.getElementById('live-rank-box').style.display = 'block';
            }
            startTime = Date.now();
            showQuestion(0);
        }

        function showQuestion(index) {
            currentIndex = index;
            const q = questions[index];
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            Object.keys(q.options).forEach(key => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerHTML = `<b>${key}.</b> ${q.options[key]}`;
                btn.onclick = () => selectOption(key, btn);
                container.appendChild(btn);
            });
        }

        function selectOption(key, btn) {
            const isCorrect = key === questions[currentIndex].answer;
            if(isCorrect) {
                btn.classList.add('correct');
                myScore += 25;
            } else {
                btn.classList.add('wrong');
            }

            if(socket) {
                socket.emit('submit-answer', { 
                    room: currentRoom, 
                    score: myScore, 
                    totalTime: (Date.now() - startTime)/1000,
                    correctAnswers: myScore/25
                });
            }

            setTimeout(() => {
                if(currentIndex < questions.length - 1) showQuestion(currentIndex + 1);
                else finishGame();
            }, 800);
        }

        function updateLiveRankUI() {
            const sorted = [...livePlayers].sort((a,b) => b.score - a.score);
            document.getElementById('live-rank-list').innerHTML = sorted.map((p, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>#${i+1} ${p.name}</span>
                    <span>${p.score}</span>
                </div>`).join('');
        }

        function finishGame() {
            if(socket) socket.emit('finish-game', currentRoom);
            else showFinalLeaderboard([{name: playerName, score: myScore}]);
        }

        function showFinalLeaderboard(players) {
            document.getElementById('quiz-page').style.display = 'none';
            document.getElementById('live-rank-box').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';
            
            const sorted = players.sort((a,b) => b.score - a.score);
            document.getElementById('leaderboard-body').innerHTML = sorted.map((p, i) => `
                <div style="background:rgba(255,255,255,0.1); padding:15px; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between;">
                    <span>Rank #${i+1} - ${p.name}</span>
                    <span style="color:cyan; font-weight:bold;">${p.score} Points</span>
                </div>`).join('');
            
            if(sorted[0].name === playerName) confetti();
        }
    </script>
</body>
</html>
